<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Profile Page</title>
    <style>
        body {
            background: #000;
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            color: white;
        }

        #top-bar {
            background: linear-gradient(135deg, #a8d8ff 0%, #A78BFA 100%);
            height: 56px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .brand {
            color: black;
            font-weight: bold;
        }

        #profile-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            text-decoration: none;
        }

        .profile-icon {
            position: relative;
            display: block;
            width: 26px;
            height: 26px;
        }

        .profile-icon::before {
            content: '';
            position: absolute;
            top: 1px;
            left: 7px;
            width: 12px;
            height: 12px;
            background: #000;
            border-radius: 50%;
        }

        .profile-icon::after {
            content: '';
            position: absolute;
            bottom: 1px;
            left: 3px;
            width: 20px;
            height: 12px;
            background: #000;
            border-radius: 12px 12px 6px 6px;
        }

        main {
            min-height: 100vh;
            margin-top: 56px;
        }
    </style>
</head>
<body>
    <div id="top-bar">
        <div class="brand">My Page</div>
        <a id="profile-link" href="profile.html" aria-label="Open profile page">
            <span class="profile-icon" aria-hidden="true"></span>
        </a>
    </div>

    <main></main>
</body>
</html>
